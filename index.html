<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Изборен Монитор — инициатива за честни и прозрачни избори в България." />
  <link rel="canonical" href="https://izborenmonitor.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://izborenmonitor.com/" />
  <meta property="og:title" content="Изборен Монитор" />
  <meta property="og:description" content="Инициатива за честни и прозрачни избори в България." />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Изборен Монитор" />
  <meta name="twitter:description" content="Инициатива за честни и прозрачни избори в България." />
  <title>🇧🇬 Изборен Монитор</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #0d1b3e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Bulgarian flag stripe */
    .stripe {
      height: 5px;
      background: linear-gradient(to right, #fff 33.33%, #00966E 33.33% 66.66%, #D62612 66.66%);
    }

    header {
      text-align: center;
      padding: 2rem 1.5rem 1.5rem;
    }

    header h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      opacity: 0.7;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 1rem 1.5rem;
    }

    .map-card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }

    .map-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      background: #fff;
      border-bottom: 1px solid #e0e0e8;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .map-bar-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #1a1a2e;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #D62612;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px rgba(214,38,18,.2); }
      50%      { box-shadow: 0 0 0 7px rgba(214,38,18,.0); }
    }

    .map-title { font-weight: 700; font-size: 0.9rem; color: #1a1a2e; }

    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: #D62612;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.4rem 0.9rem;
      border-radius: 50px;
      text-decoration: none;
      transition: background .2s;
      white-space: nowrap;
    }

    .open-btn:hover { background: #b51e0f; }

    iframe {
      display: block;
      width: 100%;
      height: 70vh;
      min-height: 320px;
      border: none;
    }

    .map-footer {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      color: #888;
      background: #fafafa;
      border-top: 1px solid #e0e0e8;
    }

    .map-footer a { color: #00966E; text-decoration: none; font-weight: 600; }
    .map-footer a:hover { text-decoration: underline; }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.78rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="stripe"></div>

  <header>
    <h1>🇧🇬 Изборен Монитор</h1>
  </header>

  <main>
    <div class="map-card">
      <div class="map-bar">
        <div class="map-bar-left">
          <div class="dot"></div>
          <span class="map-title">Карта на секциите под системен риск — https://karta.izborenmonitor.com/persistence</span>
        </div>
        <a href="https://karta.izborenmonitor.com/persistence" target="_blank" rel="noopener noreferrer" class="open-btn">
          ↗ Отвори в пълен екран
        </a>
      </div>

      <iframe
        src="https://karta.izborenmonitor.com/persistence"
        title="Карта на секциите под системен риск в България"
        loading="lazy"
        allowfullscreen
      ></iframe>

      <div class="map-footer">
        Пълната карта: <a href="https://karta.izborenmonitor.com/persistence" target="_blank" rel="noopener noreferrer">karta.izborenmonitor.com</a>
      </div>
    </div>
  </main>

  <footer>izborenmonitor.com</footer>

  <div class="stripe"></div>

</body>
